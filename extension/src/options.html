<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FB Collector Settings</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main>
      <header>
        <h1>FB Collector Settings</h1>
        <p>Configure approved groups, matching terms, and optional server upload.</p>
      </header>

      <form id="settingsForm">
        <section>
          <h2>Approved Groups</h2>
          <label for="groupUrls">One Facebook group URL per line</label>
          <textarea id="groupUrls" rows="12" spellcheck="false"></textarea>
        </section>

        <section>
          <h2>Keywords</h2>
          <label for="keywords">One keyword or phrase per line</label>
          <textarea id="keywords" rows="10" spellcheck="false"></textarea>
        </section>

        <section class="grid">
          <div>
            <h2>Upload</h2>
            <label class="checkbox">
              <input id="uploadEnabled" type="checkbox">
              Upload scan results to server
            </label>

            <label class="checkbox">
              <input id="debugIncludeUnmatched" type="checkbox">
              Debug: include unmatched visible posts
            </label>

            <label for="serverEndpoint">Server ingest endpoint</label>
            <input id="serverEndpoint" type="url" placeholder="https://example.com/api/ingest/facebook">

            <label for="ingestToken">Ingest token</label>
            <input id="ingestToken" type="password" autocomplete="off" placeholder="Stored only in Chrome extension storage">
          </div>

          <div>
            <h2>Rate Limits</h2>
            <label for="maxScrolls">Scroll passes per group</label>
            <input id="maxScrolls" type="number" min="0" max="20" step="1">

            <label for="scrollDelayMs">Delay after each scroll, ms</label>
            <input id="scrollDelayMs" type="number" min="500" max="10000" step="100">

            <label for="pageLoadDelayMs">Delay after page load, ms</label>
            <input id="pageLoadDelayMs" type="number" min="1000" max="15000" step="100">
          </div>
        </section>

        <footer>
          <button id="save" type="submit">Save Settings</button>
          <button id="resetDefaults" type="button">Reset Defaults</button>
          <span id="status" role="status"></span>
        </footer>
      </form>
    </main>

    <script src="defaults.js"></script>
    <script src="options.js"></script>
  </body>
</html>
